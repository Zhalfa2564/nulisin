    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Apakah Nulisin gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ya, Nulisin sepenuhnya gratis untuk digunakan. Tidak ada biaya tersembunyi atau langganan."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah tulisanku tersimpan di server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tidak. Semua proses terjadi di browser kamu. Teks dan hasil generate tidak dikirim ke server mana pun. Draft hanya tersimpan secara lokal di perangkatmu."
          }
        },
        {
          "@type": "Question",
          "name": "Bisa upload font sendiri?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ya! Kamu bisa upload font custom dalam format .ttf, .otf, .woff, atau .woff2. Font akan tersimpan di browser dan bisa digunakan kapan saja."
          }
        },
        {
          "@type": "Question",
          "name": "Bisa pakai background kertas sendiri?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tentu! Kamu bisa upload gambar kertas custom dan mengatur area tulisan sesuai kebutuhan."
          }
        },
        {
          "@type": "Question",
          "name": "Hasilnya bisa diedit lagi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hasil diunduh dalam format PNG, jadi tidak bisa diedit lagi. Tapi kamu bisa simpan draft dan generate ulang kapan saja."
          }
        },
        {
          "@type": "Question",
          "name": "Kenapa hasilnya beda tiap generate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Itu karena jitter effect yang membuat tulisan terlihat natural. Variasi kecil pada posisi dan rotasi karakter membuatnya mirip tulisan tangan asli."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah bisa digunakan di mobile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ya, Nulisin responsive dan bisa digunakan di smartphone, tablet, maupun desktop."
          }
        },
        {
          "@type": "Question",
          "name": "Font dan kertas custom hilang saat refresh?",

            "text": "Tidak, font dan kertas custom tersimpan di browser (localStorage) dan akan tetap ada meski kamu refresh atau tutup browser."

        }
